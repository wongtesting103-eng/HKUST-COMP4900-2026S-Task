# Workflow to validate student.json on pull requests and sync to Google Sheets

name: Validate Student and Sync to Spreadsheet

on:
  pull_request_target:
    branches: [ "master" ]

# Required to post comments on pull requests
permissions:
  pull-requests: write
  contents: read

jobs:
  check_json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.base.sha }}

      # ── Step 1: Validate student.json ────────────────────────────────────────
      - name: Validate student.json
        id: validate
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          JSON_FILE="/tmp/student.json"
          PR_REPO="${{ github.event.pull_request.head.repo.full_name }}"
          PR_SHA="${{ github.event.pull_request.head.sha }}"

          # Read student.json from the incoming PR head commit (not base branch)
          if ! gh api \
            "/repos/${PR_REPO}/contents/Data/student.json?ref=${PR_SHA}" \
            --jq '.content' | tr -d '\n' | base64 --decode > "$JSON_FILE"; then
            echo "valid=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ❌ Student Submission Validation Failed"
              echo ""
              echo "\`Data/student.json\` is **missing** from this pull request."
              echo ""
              echo "Please add the file with the structure below and push again:"
              echo '```json'
              echo '{'
              echo '  "name": "Your Name",'
              echo '  "itsc-email": "yourname@connect.ust.hk",'
              echo '  "student-id": "20000000",'
              echo '  "github-username": "your-github-username"'
              echo '}'
              echo '```'
            } > /tmp/pr_comment.md
            exit 0
          fi

          ITSC_EMAIL=$(jq -r '.["itsc-email"] // empty' "$JSON_FILE")
          STUDENT_ID=$(jq -r '.["student-id"] // empty' "$JSON_FILE")
          STUDENT_NAME=$(jq -r '.name // empty' "$JSON_FILE")
          GITHUB_USERNAME=$(jq -r '.["github-username"] // empty' "$JSON_FILE")

          echo "itsc_email=$ITSC_EMAIL" >> "$GITHUB_OUTPUT"
          echo "student_id=$STUDENT_ID" >> "$GITHUB_OUTPUT"
          echo "student_name=$STUDENT_NAME" >> "$GITHUB_OUTPUT"
          echo "github_username=$GITHUB_USERNAME" >> "$GITHUB_OUTPUT"

          # Validate itsc-email ends with @connect.ust.hk
          if [[ "$ITSC_EMAIL" != *"@connect.ust.hk" ]]; then
            echo "::error::itsc-email '$ITSC_EMAIL' does not end with @connect.ust.hk"
            echo "valid=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ❌ Student Submission Validation Failed"
              echo ""
              echo "**Invalid \`itsc-email\`:** \`${ITSC_EMAIL}\`"
              echo ""
              echo "The \`itsc-email\` field must end with \`@connect.ust.hk\`."
              echo ""
              echo "Please fix the value and push again."
            } > /tmp/pr_comment.md
            exit 0
          fi

          # Validate student-id is exactly 8 digits
          if ! [[ "$STUDENT_ID" =~ ^[0-9]{8}$ ]]; then
            echo "::error::student-id '$STUDENT_ID' is not an 8-digit number"
            echo "valid=false" >> "$GITHUB_OUTPUT"
            {
              echo "## ❌ Student Submission Validation Failed"
              echo ""
              echo "**Invalid \`student-id\`:** \`${STUDENT_ID}\`"
              echo ""
              echo "The \`student-id\` field must be exactly 8 digits (e.g. \`20000000\`)."
              echo ""
              echo "Please fix the value and push again."
            } > /tmp/pr_comment.md
            exit 0
          fi

          echo "valid=true" >> "$GITHUB_OUTPUT"
          echo "Validation passed: email=$ITSC_EMAIL, id=$STUDENT_ID"

      # ── Step 2: Post a comment when validation fails ──────────────────────────
      - name: Comment on PR (validation failed)
        if: steps.validate.outputs.valid != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body-file /tmp/pr_comment.md

      - name: Comment on PR (validation passed)
        if: steps.validate.outputs.valid == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "✅ Your pull request is valid for the submission."

      # ── Step 3: Set up Python for the sync script ───────────────────────────
      - name: Set up Python
        if: steps.validate.outputs.valid == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: .github/requirements/sync-google-sheet.txt

      - name: Display Python version
        if: steps.validate.outputs.valid == 'true'
        run: python --version

      - name: Install Python dependencies
        if: steps.validate.outputs.valid == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r .github/requirements/sync-google-sheet.txt

      # ── Step 4: Sync to Google Sheets via Python script ─────────────────────
      - name: Sync to Google Spreadsheet
        id: sync_sheet
        if: steps.validate.outputs.valid == 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          STUDENT_NAME: ${{ steps.validate.outputs.student_name }}
          GITHUB_USERNAME: ${{ steps.validate.outputs.github_username }}
          ITSC_EMAIL: ${{ steps.validate.outputs.itsc_email }}
          STUDENT_ID: ${{ steps.validate.outputs.student_id }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
        run: python .github/scripts/sync_google_sheet.py

      - name: Comment on PR (sync completed)
        if: steps.validate.outputs.valid == 'true' && success()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr comment "${{ github.event.pull_request.number }}" \
            --repo "${{ github.repository }}" \
            --body "✅ Your submission has been synced to the Google Spreadsheet.
                    🎗️ Remember to submit the PR link to Canvas"

